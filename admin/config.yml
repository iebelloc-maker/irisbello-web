backend:
  name: github
  repo: iebelloc-maker/irisbello-web
  branch: main
  base_url: https://sveltia-cms-auth.iebelloc.workers.dev

media_folder: images/blog

collections:
  - name: blog
    label: Blog
    folder: _posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Fecha, name: date, widget: datetime }
      - { label: Tema, name: tema, widget: string, hint: "Opciones sugeridas: trauma, patrones, regulacion, decisiones, malestar" }
      - { label: Extracto, name: extracto, widget: text }
      - { label: Palabras clave (SEO), name: keywords, widget: string, required: false, hint: "Separadas por coma. Ej: psicóloga Santo Domingo, cuándo ir al psicólogo, malestar emocional" }
      - { label: Imagen, name: imagen, widget: image }
      - { label: Contenido, name: body, widget: markdown }
  - name: noticias
    label: Tablón
    folder: _noticias
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Título, name: title, widget: string }
      - { label: Fecha, name: date, widget: datetime }
      - { label: Tipo, name: tipo, widget: select, options: [Nuevo, Grupo, Taller, Recurso, Aviso] }
      - { label: Texto breve, name: texto, widget: text }
      - { label: Enlace WhatsApp, name: enlace, widget: string, required: false }
